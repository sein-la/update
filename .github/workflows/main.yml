name: XServer Auto Renew

on:
  schedule:
    - cron: '0 15 * * *' # 毎日 日本時間 0:00 に実行
  workflow_dispatch:     # 手動実行ボタンを有効化

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install puppeteer

      - name: Run renewal script
        run: node index.js
        env:
          XSERVER_ID: ${{ secrets.XSERVER_ID }}
          XSERVER_PW: ${{ secrets.XSERVER_PW }}
