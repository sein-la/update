name: XServer Auto Renew

on:
  schedule:
    # 2GBプランなら4日ごとなので、余裕を持って「毎日」または「2日おき」に実行
    - cron: '0 15 */2 * *' # 日本時間 0:00 (UTC 15:00) に2日おきに実行
  workflow_dispatch: # 手動でテスト実行できるようにする設定

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run automation script
        env:
          XSERVER_ID: ${{ secrets.XSERVER_ID }}
          XSERVER_PW: ${{ secrets.XSERVER_PW }}
        run: node index.js
